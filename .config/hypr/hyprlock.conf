background {
    monitor =
    path = ~/arch-hyprland-setup/wallpaper2.jpg
    blur_passes = 2
    contrast = 0.9
    brightness = 0.8
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = FiraCode Nerd Font
    placeholder_text = <i><span foreground="##cdd6f4">Password...</span></i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%-I:%M %p")"
    color = rgba(255, 255, 255, 0.8)
    font_size = 90
    font_family = FiraCode Nerd Font ExtraBold
    position = 0, -300
    halign = center
    valign = top
}
